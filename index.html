<!DOCTYPE html>
<html>
<head>
<title>Ultra Crypto Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050814;
    color:white;
}

.header{
    padding:16px;
    text-align:center;
    background:#0f172a;
    font-weight:bold;
}

.sub{
    text-align:center;
    font-size:12px;
    opacity:0.7;
}

.container{padding:10px;}

.card{
    margin:10px 0;
    padding:12px;
    background:#121a2e;
    border-radius:12px;
    border:1px solid #1f2a44;
}

.high{border-left:5px solid #ff3b3b;}
.mid{border-left:5px solid #ffb020;}
.low{border-left:5px solid #2dd4bf;}

.small{font-size:12px;opacity:0.8;}

.badge{
    display:inline-block;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
    margin-top:6px;
    background:#1f2a44;
}

button{
    background:#00ff99;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
}

.center{text-align:center;padding:10px}

.bar{
    height:6px;
    background:#1f2a44;
    border-radius:5px;
    margin-top:8px;
}

.bar-fill{
    height:6px;
    background:linear-gradient(90deg,#00ff99,#ff3b3b);
}
</style>
</head>

<body>

<div class="header">🚀 ULTRA CRYPTO TERMINAL</div>
<div class="sub">Live Market • Momentum • Pump Signals</div>

<div class="center">
<button onclick="load()">SCAN MARKET</button>
</div>

<div id="out" class="container"></div>

<script>

/* SMART SCORING */
function score(v,c){
    let s=0;

    if(v>1000000000) s+=50;
    else if(v>200000000) s+=30;
    else s+=10;

    if(c>50) s+=50;
    else if(c>20) s+=30;
    else s+=10;

    return Math.min(s,100);
}

function label(s){
    if(s>80) return ["🚨 PUMP ZONE","high"];
    if(s>50) return ["⚠️ ACTIVE","mid"];
    return ["👀 NORMAL","low"];
}

/* FETCH */
async function load(){

    document.getElementById("out").innerHTML="Loading...";

    try{

        const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=25&page=1");
        const data=await res.json();

        let html="";

        data.forEach(c=>{

            let s=score(c.total_volume,c.price_change_percentage_24h);
            let l=label(s);

            html+=`
            <div class="card ${l[1]}">
                <b>${c.name} (${c.symbol.toUpperCase()})</b>
                <p class="small">Price: $${c.current_price}</p>
                <p class="small">Volume: ${c.total_volume}</p>
                <p class="small">Change: ${c.price_change_percentage_24h?.toFixed(2)}%</p>

                <div class="badge">${l[0]}</div>
                <p class="small">Score: ${s}/100</p>

                <div class="bar">
                    <div class="bar-fill" style="width:${s}%"></div>
                </div>
            </div>
            `;
        });

        document.getElementById("out").innerHTML=html;

    }catch(e){
        document.getElementById("out").innerHTML="API error — try again";
    }
}

load();
setInterval(load,12000);

</script>

</body>
</html>
