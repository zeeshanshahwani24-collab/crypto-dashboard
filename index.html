<!DOCTYPE html>
<html>
<head>
<title>SIGMA WHALE TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050814;
    color:white;
}

.header{
    padding:16px;
    text-align:center;
    background:#0f172a;
    font-weight:bold;
}

.sub{
    text-align:center;
    font-size:12px;
    opacity:0.7;
}

.container{padding:10px}

.card{
    margin:10px 0;
    padding:12px;
    background:#121a2e;
    border-radius:12px;
    border:1px solid #1f2a44;
}

.high{border-left:5px solid #ff3b3b}
.mid{border-left:5px solid #ffb020}
.low{border-left:5px solid #2dd4bf}

.badge{
    display:inline-block;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
    background:#1f2a44;
}

.small{font-size:12px;opacity:0.8}

button{
    background:#00ff99;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
}

.center{text-align:center;padding:10px}

.bar{
    height:6px;
    background:#1f2a44;
    border-radius:5px;
    margin-top:8px;
}

.bar-fill{
    height:6px;
    background:linear-gradient(90deg,#00ff99,#ff3b3b);
}

.pulse{
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0px #ff3b3b;}
    50%{box-shadow:0 0 15px #ff3b3b;}
    100%{box-shadow:0 0 0px #ff3b3b;}
}
</style>
</head>

<body>

<div class="header">🧬 SIGMA WHALE TERMINAL vFINAL</div>
<div class="sub">Live Market • Whale Proxy • Pump Detection • Smart Flow</div>

<div class="center">
<button onclick="load()">START SCAN</button>
</div>

<div id="out" class="container"></div>

<script>

/* =========================
   🧠 SCORING ENGINE
========================= */

function score(volume, change){

    let s = 0;

    // whale proxy (volume spike)
    if(volume > 20000000000) s += 50;
    else if(volume > 5000000000) s += 35;
    else if(volume > 1000000000) s += 15;

    // momentum
    if(change > 80) s += 50;
    else if(change > 40) s += 30;
    else if(change > 15) s += 15;

    // pump detection boost
    if(volume > 5000000000 && change > 25) s += 10;

    return Math.min(s,100);
}

/* =========================
   🚨 SIGNAL
========================= */

function signal(s){
    if(s >= 85) return ["🚨 WHALE PUMP DETECTED","high"];
    if(s >= 70) return ["⚠️ MOMENTUM BUILDING","mid"];
    return ["👀 NORMAL FLOW","low"];
}

/* =========================
   📡 FETCH DATA
========================= */

async function fetchData(){
    const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
    return await res.json();
}

/* =========================
   🚀 MAIN ENGINE
========================= */

async function load(){

    document.getElementById("out").innerHTML = "Scanning market...";

    try{

        const data = await fetchData();

        let html = "";

        data.slice(0,30).forEach(c=>{

            const volume = parseFloat(c.volume);
            const change = parseFloat(c.priceChangePercent);
            const price = parseFloat(c.lastPrice);

            const s = score(volume, change);
            const sig = signal(s);

            html += `
            <div class="card ${sig[1]} ${s>85?'pulse':''}">

                <b>${c.symbol}</b>

                <p class="small">Price: $${price}</p>
                <p class="small">Volume: ${volume}</p>
                <p class="small">Change: ${change}%</p>

                <div class="badge">${sig[0]}</div>

                <p class="small">Score: ${s}/100</p>

                <div class="bar">
                    <div class="bar-fill" style="width:${s}%"></div>
                </div>

            </div>
            `;
        });

        document.getElementById("out").innerHTML = html;

    } catch(e){
        document.getElementById("out").innerHTML = "Error loading market data";
    }
}

/* auto refresh every 10 seconds */
setInterval(load, 10000);

load();

</script>

</body>
</html>
