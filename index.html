<!DOCTYPE html>
<html>
<head>
<title>Crypto Intelligence Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#070a12;
    color:white;
}

.header{
    padding:16px;
    text-align:center;
    background:#0f172a;
    font-weight:bold;
}

.container{
    padding:10px;
}

.card{
    background:#121a2e;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    border:1px solid #1f2a44;
}

.high{border-left:5px solid #ff3b3b;}
.mid{border-left:5px solid #ffb020;}
.low{border-left:5px solid #2dd4bf;}

.small{font-size:12px; opacity:0.8;}

.badge{
    display:inline-block;
    padding:5px 8px;
    border-radius:6px;
    font-size:12px;
    margin-top:6px;
    background:#1f2a44;
}

button{
    background:#00ff99;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
}

.center{
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
🚀 Crypto Intelligence Dashboard
</div>

<div class="center">
<button onclick="load()">SCAN MARKET</button>
</div>

<div id="out" class="container"></div>

<script>

function score(volume, change){

    let s = 0;

    if(volume > 8000000) s += 45;
    else if(volume > 2000000) s += 30;
    else s += 10;

    if(change > 30) s += 45;
    else if(change > 10) s += 25;
    else s += 10;

    return Math.min(s, 100);
}

function label(s){
    if(s >= 75) return ["🚨 BREAKOUT ZONE", "high"];
    if(s >= 45) return ["⚠️ WATCH ZONE", "mid"];
    return ["👀 NORMAL", "low"];
}

async function load(){

    document.getElementById("out").innerHTML = "Loading market data...";

    try{

        const res = await fetch("https://api.dexscreener.com/latest/dex/trending");
        const data = await res.json();

        let html = "";

        data.pairs.slice(0, 25).forEach(p => {

            let name = p.baseToken.name;
            let symbol = p.baseToken.symbol;

            let price = p.priceUsd || 0;
            let volume = p.volume?.h24 || 0;
            let change = p.priceChange?.h24 || 0;

            let s = score(volume, change);
            let lab = label(s);

            html += `
            <div class="card ${lab[1]}">
                <b>${name} (${symbol})</b>
                <p class="small">Price: $${price}</p>
                <p class="small">Volume: ${volume}</p>
                <p class="small">Change: ${change}%</p>

                <div class="badge">${lab[0]}</div>
                <p class="small">Score: ${s}/100</p>
            </div>
            `;
        });

        document.getElementById("out").innerHTML = html;

    } catch(e){
        document.getElementById("out").innerHTML = "Error loading data";
    }
}

load();
setInterval(load, 12000);

</script>

</body>
</html>
